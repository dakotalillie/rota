version: 2

project_name: rota

before:
  hooks:
    - task build:ui

builds:
  - id: rota
    main: ./cmd/server
    binary: bin/rota
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: rota
    ids:
      - rota
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers_v2:
  - id: rota
    dockerfile: Dockerfile
    images:
      - dakotalillie/rota
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - go.mod
      - go.sum
      - cmd/
      - internal/
      - ui/
    build_args:
      VERSION: "{{ .Version }}"
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

release:
  draft: false
  prerelease: auto
