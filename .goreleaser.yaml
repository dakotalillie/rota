version: 2

project_name: rota

before:
  hooks:
    - task build:ui

builds:
  - id: rota
    main: ./cmd/server
    binary: bin/rota
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: rota
    ids:
      - rota
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers:
  - image_templates:
      - "dakotalillie/rota:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
  - image_templates:
      - "dakotalillie/rota:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"

docker_manifests:
  - name_template: "dakotalillie/rota:{{ .Version }}"
    image_templates:
      - "dakotalillie/rota:{{ .Version }}-amd64"
      - "dakotalillie/rota:{{ .Version }}-arm64"
  - name_template: "dakotalillie/rota:latest"
    image_templates:
      - "dakotalillie/rota:{{ .Version }}-amd64"
      - "dakotalillie/rota:{{ .Version }}-arm64"

release:
  draft: false
  prerelease: auto
