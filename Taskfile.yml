# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  dev:
    desc: Runs the dev servers
    deps:
      - dev:server
      - dev:ui
    silent: true

  dev:server:
    desc: Runs the Go API server
    cmds:
      - go run cmd/server/main.go
    silent: true

  dev:ui:
    desc: Runs the Vite dev server
    dir: ui
    cmds:
      - npm run dev
    silent: true

  format:check:ui:
    desc: Checks the formatting of the UI code
    dir: ui
    cmds:
      - npm run format:check
    silent: true

  hooks:install:
    desc: Installs git hooks via lefthook
    cmds:
      - lefthook install

  lint:ui:
    desc: Lints the UI code
    dir: ui
    cmds:
      - npm run lint
    silent: true

  test:ui:
    desc: Runs the UI tests
    dir: ui
    cmds:
      - npm run test
    silent: true
