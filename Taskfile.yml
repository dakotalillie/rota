# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  build:
    desc: Builds the production binary with the UI embedded
    deps: [build:ui]
    cmds:
      - go build -ldflags "-X main.version=$(git describe --tags --always --dirty)" -o bin/rota cmd/server/main.go

  build:e2e:
    desc: Builds the seed binary and Docker image for E2E tests
    cmds:
      - mkdir -p e2e/bin
      - go build -o e2e/bin/seed internal/cmd/seed/main.go
      - docker build -t rota-e2e:latest .
    silent: true

  clean:e2e:
    desc: Removes the E2E Docker image
    cmds:
      - docker rmi rota-e2e:latest 2>/dev/null || true
    silent: true

  build:ui:
    desc: Builds the UI for production
    dir: ui
    cmds:
      - npm run build
    silent: true

  dev:
    desc: Runs the dev servers
    deps:
      - dev:server
      - dev:ui
    silent: true

  dev:server:
    desc: Runs the Go API server
    cmds:
      - go run cmd/server/main.go
    silent: true

  dev:ui:
    desc: Runs the Vite dev server
    dir: ui
    cmds:
      - npm run dev
    silent: true

  format:e2e:
    desc: Formats the E2E code
    dir: e2e
    cmds:
      - npm run format
    silent: true

  format:server:
    desc: Formats Go code with goimports
    cmds:
      - go tool goimports -w .
    silent: true

  format:ui:
    desc: Formats the UI code
    dir: ui
    cmds:
      - npm run format
    silent: true

  install:e2e:
    desc: Installs E2E test dependencies
    dir: e2e
    cmds:
      - npm install
      - npx playwright install chromium
    silent: true

  install:hooks:
    desc: Installs git hooks via lefthook
    cmds:
      - lefthook install
    silent: true

  install:ui:
    desc: Installs UI dependencies
    dir: ui
    cmds:
      - npm install
    silent: true

  lint:e2e:
    desc: Lints the E2E code
    dir: e2e
    cmds:
      - npm run format:check
      - npm run lint
    silent: true

  lint:server:
    desc: Lints the Go code
    cmds:
      - golangci-lint run ./...
    silent: true

  lint:ui:
    desc: Lints the UI code
    dir: ui
    cmds:
      - npm run format:check
      - npm run lint
    silent: true

  seed:
    desc: Seeds the database with development data
    cmds:
      - go run internal/cmd/seed/main.go
    silent: true

  test:e2e:
    desc: Runs E2E tests
    deps: [build:e2e, install:e2e]
    dir: e2e
    cmds:
      - npx playwright test
    env:
      E2E_IMAGE: rota-e2e:latest
    silent: true

  test:server:
    desc: Runs the Go tests
    cmds:
      - go test ./...
    silent: true

  test:ui:
    desc: Runs the UI tests
    dir: ui
    cmds:
      - npm run test
    silent: true

  update-snapshots:
    desc: Regenerates snapshot golden files for Go and E2E tests
    deps: [build:e2e, install:e2e]
    cmds:
      - UPDATE_SNAPSHOTS=true go test ./...
      - cd e2e && npx playwright test --update-snapshots
    env:
      E2E_IMAGE: rota-e2e:latest
    silent: true
