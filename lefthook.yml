pre-commit:
  parallel: true
  commands:
    lint-server:
      glob: "**/*.go"
      run: task lint:server
    test-server:
      glob: "**/*.go"
      run: task test:server
    lint-ui:
      glob: "ui/**/*.{ts,tsx}"
      run: task lint:ui
    test-ui:
      glob: "ui/**/*.{ts,tsx}"
      run: task test:ui
